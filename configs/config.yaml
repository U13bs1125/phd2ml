data:
  path: "data/processed/2024pg.csv"
  targets: ["Aflac", "Fumc"]

features:
  weather: "40:"
  soil: "23:40"
  agronomy: "0:23"

train:
  cv: 5
  test_size: 0.3
  random_state: 41

tuning:
  rf:
    n_estimators: [10, 20, 50, 5]
    max_depth: [25, 30, 35, 7]

  xgb:
    n_estimators: [10, 20, 50, 5]
    max_depth: [30, 20, 15, 7]
    learning_rate: [0.01, 0.1, 0.001, 0.05]

  lasso:
    alpha: [0.09, 0.07, 0.1,0.3]

  nn:
    hidden_layer_sizes: [[64], [64, 32], [128, 64, 32], [256, 128, 64, 32]]